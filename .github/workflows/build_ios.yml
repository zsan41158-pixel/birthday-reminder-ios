name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: birthday_reminder_ios
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: birthday_reminder_ios

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Generate iOS project files
        run: |
          set -x
          flutter create . --platforms ios

      - name: Restore custom iOS files
        run: |
          # flutter create 会覆盖原生文件，把我们修改过的关键文件恢复回来
          cp -f ios/Runner/AppDelegate.swift ios/Runner/AppDelegate.swift.bak 2>/dev/null || true
          git checkout ios/Runner/AppDelegate.swift || true
          git checkout ios/Runner/Info.plist || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: |
          set -x
          flutter build ios --release --no-codesign --verbose

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r birthday_reminder.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: birthday-reminder-ios
          path: birthday_reminder_ios/birthday_reminder.ipa
